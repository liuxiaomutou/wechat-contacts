<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>名片库管理后台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- 登录页 -->
  <div id="login-page" class="page">
    <div class="login-box">
      <div class="login-logo">📇</div>
      <h1>名片库管理后台</h1>
      <p class="login-subtitle">Business Card Library Admin</p>
      <input id="login-user" class="input" type="text" placeholder="用户名" autocomplete="username">
      <input id="login-pass" class="input" type="password" placeholder="密码" autocomplete="current-password">
      <button class="btn btn-primary" onclick="doLogin()">登 录</button>
      <p id="login-error" class="error" style="display:none"></p>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="main-page" class="page" style="display:none">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">📇</span>
        <span class="sidebar-title">名片库管理</span>
      </div>
      <nav id="nav">
        <a class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">📊 概览</a>
        <a class="nav-item" data-page="users" onclick="switchPage('users')">👥 用户管理</a>
        <a class="nav-item" data-page="libraries" onclick="switchPage('libraries')">📇 名片库</a>
        <a class="nav-item" data-page="cards" onclick="switchPage('cards')">🃏 名片管理</a>
        <a class="nav-item" data-page="duplicates" onclick="switchPage('duplicates')">🔄 查重合并</a>
        <a class="nav-item" data-page="import" onclick="switchPage('import')">📤 导入导出</a>
      </nav>
      <div class="sidebar-footer">
        <span id="user-info"></span>
        <button class="btn-text" onclick="doLogout()">退出</button>
      </div>
    </aside>
    <main id="content">
      <div id="page-dashboard" class="page-content active"></div>
      <div id="page-users" class="page-content"></div>
      <div id="page-libraries" class="page-content"></div>
      <div id="page-cards" class="page-content"></div>
      <div id="page-duplicates" class="page-content"></div>
      <div id="page-import" class="page-content"></div>
    </main>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>
<!-- Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal()"></div>
<div id="modal" class="modal" style="display:none">
  <div class="modal-header"><span id="modal-title"></span><button class="btn-text" onclick="closeModal()">✕</button></div>
  <div class="modal-body" id="modal-body"></div>
</div>

<script src="app.js"></script>
<script src="modules.js"></script>
</body>
</html>
